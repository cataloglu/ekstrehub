# https://developers.home-assistant.io/docs/add-ons/configuration
name: "EkstreHub"
version: "1.0.51"
slug: "ekstrehub"
description: "Kredi kartı ekstrelerini Gmail'den otomatik çeker, AI ile parse eder ve analiz eder. DenizBank, İş Bankası, Garanti, Yapı Kredi destekli."
url: "https://github.com/cataloglu/ekstrehub/tree/master/ekstrehub"

image: "ghcr.io/cataloglu/ekstrehub/{arch}"

arch:
  - amd64
  - aarch64
  - armv7

startup: application
boot: auto
init: false

ingress: true
ingress_port: 8000
panel_icon: mdi:credit-card-multiple-outline
panel_title: "EkstreHub"
panel_admin: false

# Port 8000 - only needed when not using Ingress (e.g. direct access)
ports:
  "8000/tcp": null
ports_description:
  "8000/tcp": "Web UI & API (Ingress kullanıyorsanız gerekmez)"

options:
  log_level: "info"
  gmail_oauth_client_id: ""
  gmail_oauth_client_secret: ""
  oauth_redirect_proxy_url: ""
  ekstrehub_builtin_gmail_client_id: ""
  ekstrehub_builtin_gmail_client_secret: ""

schema:
  log_level: "list(trace|debug|info|warning|error|critical)"
  gmail_oauth_client_id: "str?"
  gmail_oauth_client_secret: "str?"
  oauth_redirect_proxy_url: "str?"
  ekstrehub_builtin_gmail_client_id: "str?"
  ekstrehub_builtin_gmail_client_secret: "str?"

# /data: add-on persistent storage (survives updates)
map:
  - data:rw
