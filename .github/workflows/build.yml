name: Build & Publish Add-on

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "ui/src/**"
      - "ui/package*.json"
      - "migrations/**"
      - "Dockerfile"
      - "config.yaml"
      - "build.yaml"
      - "requirements.txt"
      - "run.sh"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/cataloglu/ekstrehub

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.20

          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.20

          - arch: armv7
            platform: linux/arm/v7
            build_from: ghcr.io/home-assistant/armv7-base-python:3.12-alpine3.20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get add-on version
        id: version
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: //' | tr -d '"' | tr -d ' ')
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version ${VERSION} for ${{ matrix.arch }}"

      - name: Set up QEMU (for ARM emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          tags: |
            ${{ env.IMAGE_BASE }}/${{ matrix.arch }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_BASE }}/${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  notify:
    name: Notify on success
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: //' | tr -d '"' | tr -d ' ')
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## EkstreHub v${{ steps.version.outputs.VERSION }} built successfully! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images published to GitHub Container Registry:" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/cataloglu/ekstrehub/amd64:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/cataloglu/ekstrehub/aarch64:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/cataloglu/ekstrehub/armv7:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install in Home Assistant" >> $GITHUB_STEP_SUMMARY
          echo "Add this repository: \`https://github.com/cataloglu/ekstrehub\`" >> $GITHUB_STEP_SUMMARY
