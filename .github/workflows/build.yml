name: Build & Publish Add-on

on:
  push:
    branches: [master]
    paths:
      - ".github/**"
      - "app/**"
      - "ui/src/**"
      - "ui/package*.json"
      - "migrations/**"
      - "Dockerfile"
      - "ekstrehub/**"
      - "requirements.txt"
      - "run.sh"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/cataloglu/ekstrehub

jobs:
  version:
    name: Get version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from config.yaml
        id: ver
        run: |
          VERSION=$(grep '^version:' ekstrehub/config.yaml | head -1 | sed 's/version:[[:space:]]*//' | tr -d '"')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: "ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.20"

          - arch: aarch64
            platform: linux/arm64
            build_from: "ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.20"

          - arch: armv7
            platform: linux/arm/v7
            build_from: "ghcr.io/home-assistant/armv7-base-python:3.12-alpine3.20"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          build-args: BUILD_FROM=${{ matrix.build_from }}
          tags: |
            ${{ env.IMAGE_BASE }}/${{ matrix.arch }}:${{ needs.version.outputs.version }}
            ${{ env.IMAGE_BASE }}/${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  notify:
    name: Build summary
    runs-on: ubuntu-latest
    needs: [version, build]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## EkstreHub v${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Arch | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| amd64 | \`${{ env.IMAGE_BASE }}/amd64:${{ needs.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| aarch64 | \`${{ env.IMAGE_BASE }}/aarch64:${{ needs.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| armv7 | \`${{ env.IMAGE_BASE }}/armv7:${{ needs.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**HA Kurulum:** \`https://github.com/cataloglu/ekstrehub\`" >> $GITHUB_STEP_SUMMARY
