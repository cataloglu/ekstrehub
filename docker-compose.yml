version: "3.9"

services:
  api:
    image: python:3.11-slim
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             python -m app.main"
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DB_URL=${DB_URL}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-}
      - MAIL_INGESTION_ENABLED=${MAIL_INGESTION_ENABLED:-true}
      - IMAP_HOST=${IMAP_HOST:-}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER:-}
      - IMAP_PASSWORD=${IMAP_PASSWORD:-}
      - IMAP_MAILBOX=${IMAP_MAILBOX:-INBOX}
      - IMAP_UNSEEN_ONLY=${IMAP_UNSEEN_ONLY:-true}
      - IMAP_FETCH_LIMIT=${IMAP_FETCH_LIMIT:-20}
      - IMAP_RETRY_COUNT=${IMAP_RETRY_COUNT:-3}
      - IMAP_RETRY_BACKOFF_SECONDS=${IMAP_RETRY_BACKOFF_SECONDS:-1.5}
      - GMAIL_OAUTH_CLIENT_ID=${GMAIL_OAUTH_CLIENT_ID:-}
      - GMAIL_OAUTH_CLIENT_SECRET=${GMAIL_OAUTH_CLIENT_SECRET:-}
    profiles:
      - api

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ekstrehub}
      - POSTGRES_USER=${POSTGRES_USER:-ekstrehub}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ekstrehub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - db

  worker:
    image: python:3.11-slim
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             python -c 'import time; print(\"worker profile is ready\"); time.sleep(3600)'"
    profiles:
      - worker

  migrate:
    image: python:3.11-slim
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             alembic upgrade head"
    depends_on:
      - db
    profiles:
      - migrate

volumes:
  postgres_data:

