name: "EkstreHub"
version: "1.0.0"
slug: "ekstrehub"
description: "Kredi kartı ekstrelerini Gmail'den otomatik çeker, AI ile parse eder ve analiz eder."
url: "https://github.com/yourusername/ekstrehub"

arch:
  - amd64
  - aarch64
  - armv7

startup: application
boot: auto
init: false

ingress: true
ingress_port: 8000
panel_icon: mdi:credit-card-multiple-outline
panel_title: "EkstreHub"
panel_admin: false

# Persistent data (database + settings) are stored in /data automatically.
# Users configure mail accounts and LLM settings through the app's own UI.

options:
  log_level: "info"
  gmail_oauth_client_id: ""
  gmail_oauth_client_secret: ""

schema:
  log_level: "list(trace|debug|info|warning|error|critical)"
  gmail_oauth_client_id: "str?"
  gmail_oauth_client_secret: "str?"

map:
  - data:rw
